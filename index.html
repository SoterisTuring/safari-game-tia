function showThankYouPage() {
  document.body.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#ffffff;font-family:Poppins,sans-serif;text-align:center;padding:40px"><div><div style="font-size:64px;margin-bottom:20px">✅</div><h1 style="color:#1a1a2e;font-size:24px;margin-bottom:12px">Ευχαριστούμε!</h1><p style="color:#555;font-size:16px">Μπορείτε να κλείσετε αυτή τη σελίδα.</p></div></div>';
}

function waitForFirebase() {
  return new Promise(function(resolve) {
    if (window.DB) { firebaseReady = true; resolve(); }
    else window.addEventListener("firebase-ready", function() { firebaseReady = true; resolve(); });
  });
}

async function saveVisitor(visitorId, visitorData) {
  if (!firebaseReady) await waitForFirebase();
  var db = window.DB.db, ref = window.DB.ref, setFn = window.DB.set;
  await setFn(ref(db, "visitors/" + visitorId), visitorData);
}

async function getVisitor(visitorId) {
  if (!firebaseReady) await waitForFirebase();
  var db = window.DB.db, ref = window.DB.ref, getFn = window.DB.get, childFn = window.DB.child;
  var snap = await getFn(childFn(ref(db), "visitors/" + visitorId));
  return snap.exists() ? snap.val() : null;
}

async function getAllVisitors() {
  if (!firebaseReady) await waitForFirebase();
  var db = window.DB.db, ref = window.DB.ref, getFn = window.DB.get;
  var snap = await getFn(ref(db, "visitors"));
  return snap.exists() ? snap.val() : {};
}

function listenVisitors(callback) {
  if (!firebaseReady) return;
  var db = window.DB.db, ref = window.DB.ref, onValueFn = window.DB.onValue;
  onValueFn(ref(db, "visitors"), function(snap) {
    callback(snap.exists() ? snap.val() : {});
  });
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  if (page === 'admin') loadAdminData();
  window.scrollTo(0, 0);
}

function showScan(boothId, barcodeType) {
  var booth = null;
  for (var i = 0; i < BOOTHS.length; i++) {
    if (BOOTHS[i].id === boothId) { booth = BOOTHS[i]; break; }
  }
  if (!booth) return;
  renderScanPage(booth, barcodeType);
  showPage('scan');
}

function renderScanPage(booth, barcodeType) {
  var isType2 = barcodeType === 2;
  var accent = isType2 ? "#bd93f9" : booth.accent;

  var bg = document.getElementById('scan-bg');
  bg.style.background = isType2
    ? 'linear-gradient(135deg, ' + booth.color + ' 0%, #1a0a2e 50%, ' + booth.accent + '33 100%)'
    : 'linear-gradient(135deg, ' + booth.color + ' 0%, ' + booth.color + ' 100%)';
  bg.innerHTML = generateBubbles(booth.accent, isType2);

  var card = document.getElementById('scan-card');
  card.style.background = isType2 ? "rgba(26,10,46,0.85)" : "rgba(255,255,255,0.06)";
  card.style.border = '2px solid ' + (isType2 ? "rgba(189,147,249,0.3)" : booth.accent + "44");
  card.style.boxShadow = isType2 ? "0 0 80px rgba(189,147,249,0.15),0 24px 48px rgba(0,0,0,0.5)" : '0 0 60px ' + booth.accent + '22,0 24px 48px rgba(0,0,0,0.4)';

  document.getElementById('scan-logo-area').innerHTML = renderLogo(isType2 ? 'iminder' : 'academy', 'large');

  var badge = document.getElementById('scan-badge');
  badge.style.background = isType2 ? "rgba(189,147,249,0.15)" : "rgba(255,255,255,0.08)";
  badge.style.border = '1px solid ' + (isType2 ? "rgba(189,147,249,0.35)" : booth.accent + "55");
  badge.innerHTML = '<span style="font-size:13px;color:' + accent + ';font-weight:600;letter-spacing:1px;text-transform:uppercase">' + (isType2 ? "🎁 Bonus — Διαφημιστικό" : "📍 Επίσκεψη Περιπτέρου") + '</span>';

  var icon = document.getElementById('scan-booth-icon');
  icon.style.background = isType2 ? "linear-gradient(135deg,rgba(189,147,249,0.15),rgba(189,147,249,0.3))" : 'linear-gradient(135deg,' + booth.accent + '22,' + booth.accent + '44)';
  icon.style.border = '2px solid ' + (isType2 ? "rgba(189,147,249,0.4)" : booth.accent + "66");
  icon.textContent = booth.icon;

  document.getElementById('scan-booth-name').textContent = booth.name;
  var catEl = document.getElementById('scan-booth-cat');
  catEl.textContent = booth.category;
  catEl.style.color = accent;

  document.getElementById('scan-divider').style.background = 'linear-gradient(90deg,transparent,' + accent + '66,transparent)';

  var borderColor = isType2 ? "rgba(189,147,249,0.4)" : booth.accent + "66";
  var btnBg = isType2 ? "linear-gradient(135deg,#bd93f9,#8b5cf6)" : 'linear-gradient(135deg,' + booth.accent + ',' + booth.accent + 'cc)';
  var btnShadow = isType2 ? "0 8px 24px rgba(189,147,249,0.3)" : '0 8px 24px ' + booth.accent + '44';

  document.getElementById('scan-content').innerHTML =
    '<p style="color:rgba(255,255,255,0.7);font-size:15px;margin:0 0 20px;line-height:1.5">Εισάγετε τον αριθμό συμμετοχής σας</p>' +
    '<div style="position:relative;margin-bottom:24px">' +

    '</div>' +
    '<button id="btn-submit" onclick="handleScan(\'' + booth.id + '\',' + barcodeType + ')" style="width:100%;padding:18px;font-size:18px;font-weight:700;background:' + btnBg + ';color:#fff;border:none;border-radius:16px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all 0.3s;box-shadow:' + btnShadow + '">✅ Done</button>' +
    '<p style="color:rgba(255,255,255,0.35);font-size:12px;margin:16px 0 0;letter-spacing:0.5px">Πατήστε Done για ολοκλήρωση</p>';

  setTimeout(function() {
    var inp = document.getElementById('visitor-input');
    if (inp) {
      inp.focus();
      inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleScan(booth.id, barcodeType); });
    }
  }, 100);
}

async function handleScan(boothId, barcodeType) {
  var input = document.getElementById('visitor-input');
  var btn = document.getElementById('btn-submit');
  var visitorId = input ? input.value.trim() : '';
  if (!visitorId) return;

  btn.textContent = "⏳ Αποθήκευση...";
  btn.disabled = true;

  try {
    var visitor = await getVisitor(visitorId);
    if (!visitor) visitor = { scans: {}, totalPoints: 0 };
    if (!visitor.scans) visitor.scans = {};
    if (!visitor.scans[boothId]) visitor.scans[boothId] = { barcode1: false, barcode2: false };

    var key = barcodeType === 1 ? "barcode1" : "barcode2";
    if (visitor.scans[boothId][key]) {
      showScanResult('duplicate', visitorId, barcodeType);
      return;
    }

    visitor.scans[boothId][key] = true;
    visitor.totalPoints += (barcodeType === 1 ? POINTS_BC1 : POINTS_BC2);
    await saveVisitor(visitorId, visitor);
    showScanResult('success', visitorId, barcodeType);
  } catch (err) {
    console.error(err);
    showScanResult('error', visitorId, barcodeType);
  }
}

async function loadAdminData() {
  try { adminData = await getAllVisitors(); } catch(e) { adminData = {}; }
  renderAdmin();
}

function setAdminView(v) {
  adminView = v;
  selectedVisitor = null;
  document.querySelectorAll('.admin-tab').forEach(function(t) {
    t.style.background = "rgba(255,255,255,0.04)";
    t.style.color = "rgba(255,255,255,0.5)";
    t.style.border = "1px solid rgba(255,255,255,0.08)";
  });
  var active = document.getElementById('btn-' + v);
  active.style.background = "rgba(56,189,248,0.15)";
  active.style.color = "#38bdf8";
  active.style.border = "1px solid rgba(56,189,248,0.4)";
  renderAdmin();
}

function filterAdmin() { renderAdmin(); }

function getSorted() {
  return Object.entries(adminData)
    .map(function(entry) {
      var id = entry[0], v = entry[1];
      return {
        id: id, totalPoints: v.totalPoints || 0,
        boothsVisited: v.scans ? Object.keys(v.scans).length : 0,
        scans: v.scans || {},
        bc1: v.scans ? Object.values(v.scans).filter(function(s) { return s.barcode1; }).length : 0,
        bc2: v.scans ? Object.values(v.scans).filter(function(s) { return s.barcode2; }).length : 0,
      };
    })
    .sort(function(a, b) { return b.totalPoints - a.totalPoints || b.boothsVisited - a.boothsVisited; });
}

function renderAdmin() {
  var searchEl = document.getElementById('admin-search');
  var search = searchEl ? searchEl.value : "";
  var sorted = getSorted();
  var filtered = search ? sorted.filter(function(v) { return v.id.indexOf(search) !== -1; }) : sorted;
  var totalScans = sorted.reduce(function(s, v) { return s + v.bc1 + v.bc2; }, 0);
  var maxPts = sorted.length > 0 ? sorted[0].totalPoints : 0;

  document.getElementById('admin-stats').innerHTML = [
    { l:"Συμμετέχοντες", v:sorted.length, i:"👥", c:"#38bdf8" },
    { l:"Συνολικά Scans", v:totalScans, i:"📱", c:"#64ffda" },
    { l:"Μέγιστοι Πόντοι", v:maxPts, i:"🏆", c:"#fbbf24" },
    { l:"Περίπτερα", v:9, i:"🏪", c:"#bd93f9" },
  ].map(function(s) { return '<div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:16px;border:1px solid rgba(255,255,255,0.06)"><div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">' + s.i + ' ' + s.l + '</div><div style="font-size:28px;font-weight:900;color:' + s.c + ';font-family:Orbitron,sans-serif">' + s.v + '</div></div>'; }).join('');

  var container = document.getElementById('admin-content');

  if (adminView === 'leaderboard') {
    if (filtered.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3)"><div style="font-size:48px;margin-bottom:16px">📭</div><p>' + (search?"Δεν βρέθηκε ID":"Κανένα scan ακόμα") + '</p></div>';
      return;
    }
    container.innerHTML = filtered.map(function(v) {
      var rank = sorted.indexOf(v) + 1;
      var medal = rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":"#"+rank;
      var barW = (v.totalPoints/180)*100;
      var bgColor = rank<=3?"rgba(251,191,36,0.04)":"rgba(255,255,255,0.02)";
      var borderColor = rank<=3?"rgba(251,191,36,0.15)":"rgba(255,255,255,0.06)";
      var rankColor = rank<=3?"#fbbf24":"rgba(255,255,255,0.3)";
      var scoreColor = rank===1?"#fbbf24":"#38bdf8";
      var barBg = rank===1?"linear-gradient(90deg,#fbbf24,#f59e0b)":rank<=3?"linear-gradient(90deg,#38bdf8,#818cf8)":"linear-gradient(90deg,rgba(255,255,255,0.2),rgba(255,255,255,0.1))";
      return '<div onclick="selectedVisitor=\'' + v.id + '\';setAdminView(\'detail\')" style="background:' + bgColor + ';border:1px solid ' + borderColor + ';border-radius:14px;padding:16px 20px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:16px" onmouseover="this.style.background=\'rgba(56,189,248,0.06)\'" onmouseout="this.style.background=\'' + bgColor + '\'">' +
        '<div style="font-size:' + (rank<=3?28:16) + 'px;min-width:44px;text-align:center;font-weight:900;color:' + rankColor + ';font-family:Orbitron,sans-serif">' + medal + '</div>' +
        '<div style="flex:1"><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap"><span style="font-size:18px;font-weight:700;color:#fff;font-family:JetBrains Mono,monospace">ID: ' + v.id + '</span><span style="font-size:12px;color:rgba(255,255,255,0.35)">' + v.boothsVisited + '/9 • BC1:' + v.bc1 + ' • BC2:' + v.bc2 + '</span></div><div style="height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:' + barW + '%;background:' + barBg + ';transition:width 0.5s ease"></div></div></div>' +
        '<div style="font-size:24px;font-weight:900;color:' + scoreColor + ';font-family:Orbitron,sans-serif;min-width:70px;text-align:right">' + v.totalPoints + '<span style="font-size:11px;color:rgba(255,255,255,0.3);display:block;font-weight:400">πόντοι</span></div></div>';
    }).join('');
  } else {
    if (selectedVisitor && adminData[selectedVisitor]) {
      var v = adminData[selectedVisitor];
      var boothsHtml = BOOTHS.map(function(b) {
        var sc = v.scans ? v.scans[b.id] : null;
        var hasScan = !!sc;

        var bc2 = sc && sc.barcode2;
        return '<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:' + (hasScan?"rgba(56,189,248,0.04)":"rgba(255,255,255,0.01)") + ';border:1px solid ' + (hasScan?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)") + '">' +
          '<span style="font-size:24px">' + b.icon + '</span>' +
          '<div style="flex:1"><div style="font-size:14px;font-weight:600;color:' + (hasScan?"#fff":"rgba(255,255,255,0.25)") + '">' + b.name + '</div><div style="font-size:11px;color:rgba(255,255,255,0.35)">' + b.category + '</div></div>' +
          '<div style="display:flex;gap:6px">' +
          '<span style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;background:' + (bc1?"rgba(100,255,218,0.15)":"rgba(255,255,255,0.04)") + ';color:' + (bc1?"#64ffda":"rgba(255,255,255,0.2)") + ';border:1px solid ' + (bc1?"rgba(100,255,218,0.3)":"rgba(255,255,255,0.06)") + '">BC1 ' + (bc1?"✓":"—") + '</span>' +
          '<span style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;background:' + (bc2?"rgba(189,147,249,0.15)":"rgba(255,255,255,0.04)") + ';color:' + (bc2?"#bd93f9":"rgba(255,255,255,0.2)") + ';border:1px solid ' + (bc2?"rgba(189,147,249,0.3)":"rgba(255,255,255,0.06)") + '">BC2 ' + (bc2?"✓":"—") + '</span></div></div>';
      }).join('');
      var scansCount = v.scans ? Object.keys(v.scans).length : 0;
      container.innerHTML = '<button onclick="selectedVisitor=null;renderAdmin()" style="padding:8px 16px;font-size:13px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;margin-bottom:20px">← Πίσω</button>' +
        '<div style="background:rgba(255,255,255,0.03);border-radius:16px;border:1px solid rgba(255,255,255,0.08);padding:24px">' +
        '<h2 style="font-family:Orbitron,sans-serif;color:#38bdf8;margin:0 0 8px;font-size:20px">Visitor #' + selectedVisitor + '</h2>' +
        '<p style="color:rgba(255,255,255,0.4);margin:0 0 20px;font-size:14px">Σύνολο: <strong style="color:#fbbf24;font-size:18px">' + v.totalPoints + ' πόντοι</strong> • ' + scansCount + '/9 περίπτερα</p>' +
        '<div style="display:grid;gap:8px">' + boothsHtml + '</div></div>';
    } else {
      container.innerHTML = '<p style="color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:16px">Επιλέξτε συμμετέχοντα:</p>' +
        filtered.map(function(v) {
          return '<div onclick="selectedVisitor=\'' + v.id + '\';renderAdmin()" style="display:flex;align-items:center;gap:12px;padding:14px 18px;margin-bottom:6px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:background 0.2s" onmouseover="this.style.background=\'rgba(56,189,248,0.06)\'" onmouseout="this.style.background=\'rgba(255,255,255,0.02)\'">' +
            '<span style="font-family:JetBrains Mono,monospace;font-weight:700;color:#fff;font-size:16px">#' + v.id + '</span>' +
            '<span style="color:rgba(255,255,255,0.4);font-size:13px">' + v.totalPoints + 'π • ' + v.boothsVisited + ' περίπτ.</span>' +
            '<span style="margin-left:auto;color:rgba(255,255,255,0.2);font-size:18px">→</span></div>';
        }).join('');
    }
  }
}

function exportCSV() {
  var sorted = getSorted();
  if (sorted.length === 0) { alert("Δεν υπάρχουν δεδομένα!"); return; }
  var csv = "ID,Total Points,Booths Visited,BC1 Count,BC2 Count";
  BOOTHS.forEach(function(b) { csv += "," + b.name + " BC1," + b.name + " BC2"; });
  csv += "\n";
  sorted.forEach(function(v) {
    csv += v.id + "," + v.totalPoints + "," + v.boothsVisited + "," + v.bc1 + "," + v.bc2;
    BOOTHS.forEach(function(b) {
      var sc = v.scans[b.id];
      csv += "," + (sc && sc.barcode1 ? "✓" : "—") + "," + (sc && sc.barcode2 ? "✓" : "—");
    });
    csv += "\n";
  });
  var blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  var link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "safari_game_results_" + new Date().toISOString().slice(0,10) + ".csv";
  link.click();
}

function showConfetti() {
  var container = document.getElementById('confetti-container');
  container.innerHTML = '';
  container.style.cssText = 'position:fixed;inset:0;z-index:999;pointer-events:none';
  var colors = ["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff6b9d","#c084fc"];
  for (var i = 0; i < 40; i++) {
    var p = document.createElement('div');
    p.style.cssText = 'position:absolute;width:' + (6+Math.random()*8) + 'px;height:' + (6+Math.random()*8) + 'px;background:' + colors[i%6] + ';left:' + (Math.random()*100) + '%;top:-10px;border-radius:' + (Math.random()>.5?"50%":"2px") + ';animation:confettiFall ' + (2+Math.random()*3) + 's ease-in forwards;animation-delay:' + (Math.random()*1.5) + 's;transform:rotate(' + (Math.random()*360) + 'deg)';
    container.appendChild(p);
  }
  setTimeout(function() { container.innerHTML = ''; }, 5000);
}

function generateBubbles(color, isBonus) {
  var html = '';
  for (var i = 0; i < 6; i++) {
    html += '<div style="position:absolute;width:' + (120+i*60) + 'px;height:' + (120+i*60) + 'px;border-radius:50%;background:radial-gradient(circle,' + (isBonus?"rgba(189,147,249,0.15)":color+"22") + ' 0%,transparent 70%);left:' + (10+i*15) + '%;top:' + (5+(i%3)*30) + '%;animation:floatBubble ' + (6+i*2) + 's ease-in-out infinite alternate;animation-delay:' + (i*0.8) + 's"></div>';
  }
  if (isBonus) {
    for (var j = 0; j < 12; j++) {
      html += '<div style="position:absolute;width:3px;height:3px;border-radius:50%;background:#bd93f9;left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;animation:twinkle ' + (2+Math.random()*3) + 's ease-in-out infinite;animation-delay:' + (Math.random()*4) + 's;opacity:0.4"></div>';
    }
  }
  return html;
}

function toggleDemo() {
  var section = document.getElementById('demo-section');
  var btn = document.getElementById('btn-demo');
  if (section.style.display === 'none') {
    section.style.display = 'block';
    btn.textContent = '✕ Κλείσε Demo';
  } else {
    section.style.display = 'none';
    btn.textContent = '📱 Demo Scan';
  }
}

function init() {
  // Check URL parameters FIRST before anything else
  var urlObj = new URL(window.location.href);
  var boothFromUrl = urlObj.searchParams.get("booth");
  var typeFromUrl = parseInt(urlObj.searchParams.get("type")) || 1;

  // Also check hash as fallback
  if (!boothFromUrl && window.location.hash && window.location.hash.length > 1) {
    try {
      var hashParams = new URLSearchParams(window.location.hash.substring(1));
      boothFromUrl = hashParams.get("booth");
      typeFromUrl = parseInt(hashParams.get("type")) || 1;
    } catch(e) {}
  }

  // If we have booth parameter, go directly to scan - skip home page setup
  if (boothFromUrl) {
    // Minimal setup needed for scan page
    showScan(boothFromUrl, typeFromUrl);

    // Still init firebase listener
    waitForFirebase().then(function() {
      listenVisitors(function(data) { adminData = data; });
    });
    return; // STOP HERE - don't render home page
  }

  // Only render home page if no booth parameter
  document.getElementById('home-bg').style.cssText = 'position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(135deg,#06060f 0%,#0a192f 100%)';
  document.getElementById('home-bg').innerHTML = generateBubbles('#38bdf8', false);

  document.querySelectorAll('.logo-academy').forEach(function(el) { el.innerHTML = renderLogo('academy', el.dataset.size || 'normal'); });
  document.querySelectorAll('.logo-iminder').forEach(function(el) { el.innerHTML = renderLogo('iminder', el.dataset.size || 'normal'); });

  document.getElementById('demo-grid').innerHTML = BOOTHS.map(function(b) {
    return '<div style="background:rgba(255,255,255,0.03);border-radius:14px;border:1px solid ' + b.accent + '33;padding:20px;text-align:center;transition:all 0.2s" onmouseover="this.style.background=\'' + b.accent + '11\';this.style.borderColor=\'' + b.accent + '66\'" onmouseout="this.style.background=\'rgba(255,255,255,0.03)\';this.style.borderColor=\'' + b.accent + '33\'">' +
      '<div style="font-size:36px;margin-bottom:8px">' + b.icon + '</div>' +
      '<div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px">' + b.name + '</div>' +
      '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:14px">' + b.category + '</div>' +
      '<div style="display:flex;gap:8px;justify-content:center">' +
      '<button onclick="showScan(\'' + b.id + '\',1)" style="padding:8px 14px;font-size:12px;font-weight:600;background:' + b.accent + '22;color:' + b.accent + ';border:1px solid ' + b.accent + '44;border-radius:8px;cursor:pointer">BC 1</button>' +
      '<button onclick="showScan(\'' + b.id + '\',2)" style="padding:8px 14px;font-size:12px;font-weight:600;background:rgba(189,147,249,0.15);color:#bd93f9;border:1px solid rgba(189,147,249,0.35);border-radius:8px;cursor:pointer">BC 2</button></div></div>';
  }).join('');

  document.querySelector('.steps-list').innerHTML = [
    { t:"Σκανάρετε το QR Code στο περίπτερο", i:"📱" },
    { t:"Πάρτε διαφημιστικό & σκανάρετε το bonus QR", i:"🎁" },
    { t:"Εισάγετε τον αριθμό συμμετοχής σας", i:"🔢" },
    { t:"Πατήστε Done — ολοκληρώθηκε!", i:"✅" },
    { t:"Επισκεφθείτε όσα περισσότερα περίπτερα μπορείτε!", i:"🏆" },
  ].map(function(s) { return '<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px"><div style="min-width:36px;height:36px;border-radius:10px;background:rgba(56,189,248,0.1);display:flex;align-items:center;justify-content:center;font-size:18px">' + s.i + '</div><p style="color:rgba(255,255,255,0.6);font-size:14px;margin:8px 0 0;line-height:1.5">' + s.t + '</p></div>'; }).join('');

  setAdminView('leaderboard');

  waitForFirebase().then(function() {
    listenVisitors(function(data) {
      adminData = data;
      if (document.getElementById('page-admin').classList.contains('active')) renderAdmin();
    });
  });
}

document.addEventListener('DOMContentLoaded', init);
